<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="iconGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 10 7 M 10 13 L 10 20 M 0 10 L 7 10 M 13 10 L 20 10" fill="none" stroke="#1A2B4A" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <rect width="200" height="200" fill="#0A1628"/>
  <rect width="200" height="200" fill="url(#iconGrid)"/>
  
  <!-- Central processor chip -->
  <rect x="60" y="60" width="80" height="80" rx="4" fill="none" stroke="#00D4FF" stroke-width="2"/>
  <rect x="70" y="70" width="60" height="60" rx="2" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  
  <!-- Pins -->
  <line x1="60" y1="75" x2="45" y2="75" stroke="#00D4FF" stroke-width="2"/>
  <line x1="60" y1="90" x2="45" y2="90" stroke="#00D4FF" stroke-width="2"/>
  <line x1="60" y1="105" x2="45" y2="105" stroke="#00D4FF" stroke-width="2"/>
  <line x1="60" y1="120" x2="45" y2="120" stroke="#00D4FF" stroke-width="2"/>
  
  <line x1="140" y1="75" x2="155" y2="75" stroke="#00D4FF" stroke-width="2"/>
  <line x1="140" y1="90" x2="155" y2="90" stroke="#00D4FF" stroke-width="2"/>
  <line x1="140" y1="105" x2="155" y2="105" stroke="#00D4FF" stroke-width="2"/>
  <line x1="140" y1="120" x2="155" y2="120" stroke="#00D4FF" stroke-width="2"/>
  
  <line x1="75" y1="60" x2="75" y2="45" stroke="#A78BFA" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="45" stroke="#A78BFA" stroke-width="2"/>
  <line x1="105" y1="60" x2="105" y2="45" stroke="#A78BFA" stroke-width="2"/>
  <line x1="120" y1="60" x2="120" y2="45" stroke="#A78BFA" stroke-width="2"/>
  
  <line x1="75" y1="140" x2="75" y2="155" stroke="#A78BFA" stroke-width="2"/>
  <line x1="90" y1="140" x2="90" y2="155" stroke="#A78BFA" stroke-width="2"/>
  <line x1="105" y1="140" x2="105" y2="155" stroke="#A78BFA" stroke-width="2"/>
  <line x1="120" y1="140" x2="120" y2="155" stroke="#A78BFA" stroke-width="2"/>
  
  <!-- Traces -->
  <path d="M 45 90 L 30 90 L 30 40" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.6"/>
  <circle cx="30" cy="40" r="5" fill="#00D4FF"/>
  
  <path d="M 155 100 L 170 100 L 170 40" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <circle cx="170" cy="40" r="5" fill="#A78BFA"/>
  
  <path d="M 45 110 L 30 110 L 30 160" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <circle cx="30" cy="160" r="5" fill="#A78BFA"/>
  
  <path d="M 155 105 L 170 105 L 170 160" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.6"/>
  <circle cx="170" cy="160" r="5" fill="#00D4FF"/>
  
  <!-- Core -->
  <circle cx="100" cy="100" r="8" fill="#00D4FF"/>
</svg>