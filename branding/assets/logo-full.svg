<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <pattern id="circuitGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 20 15 M 20 25 L 20 40 M 0 20 L 15 20 M 25 20 L 40 20" fill="none" stroke="#1A2B4A" stroke-width="1"/>
      <circle cx="20" cy="20" r="2" fill="#1A2B4A"/>
    </pattern>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <rect width="600" height="300" fill="#0A1628"/>
  <rect width="600" height="300" fill="url(#circuitGrid)"/>
  
  <!-- Central processor chip -->
  <rect x="130" y="90" width="100" height="100" rx="4" fill="none" stroke="#00D4FF" stroke-width="2"/>
  <rect x="140" y="100" width="80" height="80" rx="2" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  
  <!-- Chip pins -->
  <line x1="130" y1="110" x2="110" y2="110" stroke="#00D4FF" stroke-width="2"/>
  <line x1="130" y1="130" x2="110" y2="130" stroke="#00D4FF" stroke-width="2"/>
  <line x1="130" y1="150" x2="110" y2="150" stroke="#00D4FF" stroke-width="2"/>
  <line x1="130" y1="170" x2="110" y2="170" stroke="#00D4FF" stroke-width="2"/>
  
  <line x1="230" y1="110" x2="250" y2="110" stroke="#00D4FF" stroke-width="2"/>
  <line x1="230" y1="130" x2="250" y2="130" stroke="#00D4FF" stroke-width="2"/>
  <line x1="230" y1="150" x2="250" y2="150" stroke="#00D4FF" stroke-width="2"/>
  <line x1="230" y1="170" x2="250" y2="170" stroke="#00D4FF" stroke-width="2"/>
  
  <line x1="150" y1="90" x2="150" y2="70" stroke="#A78BFA" stroke-width="2"/>
  <line x1="170" y1="90" x2="170" y2="70" stroke="#A78BFA" stroke-width="2"/>
  <line x1="190" y1="90" x2="190" y2="70" stroke="#A78BFA" stroke-width="2"/>
  <line x1="210" y1="90" x2="210" y2="70" stroke="#A78BFA" stroke-width="2"/>
  
  <line x1="150" y1="190" x2="150" y2="210" stroke="#A78BFA" stroke-width="2"/>
  <line x1="170" y1="190" x2="170" y2="210" stroke="#A78BFA" stroke-width="2"/>
  <line x1="190" y1="190" x2="190" y2="210" stroke="#A78BFA" stroke-width="2"/>
  <line x1="210" y1="190" x2="210" y2="210" stroke="#A78BFA" stroke-width="2"/>
  
  <!-- Connection traces to agents -->
  <path d="M 110 130 L 80 130 L 80 60" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.6"/>
  <circle cx="80" cy="60" r="6" fill="#00D4FF"/>
  
  <path d="M 250 140 L 280 140 L 280 60" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <circle cx="280" cy="60" r="6" fill="#A78BFA"/>
  
  <path d="M 110 160 L 80 160 L 80 230" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <circle cx="80" cy="230" r="6" fill="#A78BFA"/>
  
  <path d="M 250 150 L 280 150 L 280 230" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.6"/>
  <circle cx="280" cy="230" r="6" fill="#00D4FF"/>
  
  <!-- Core glow -->
  <circle cx="180" cy="140" r="10" fill="#00D4FF"/>
  
  <!-- Wordmark -->
  <text x="340" y="130" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="4">CONTINUUM</text>
  
  <!-- Tagline -->
  <text x="340" y="160" font-family="'JetBrains Mono', monospace" font-size="13" fill="#A78BFA" letter-spacing="2">THE PERSISTENT BRAIN FOR YOUR AGENT SWARM</text>
  
  <!-- Decorative line -->
  <rect x="340" y="175" width="220" height="2" fill="#00D4FF" opacity="0.5"/>
</svg>