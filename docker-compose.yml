version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: continuum-postgres
    environment:
      POSTGRES_USER: continuum
      POSTGRES_PASSWORD: continuum_secret_2026
      POSTGRES_DB: continuum
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./internal/models/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continuum -d continuum"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: continuum-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    container_name: continuum-api
    environment:
      - CONTINUUM_DATABASE_URL=postgres://continuum:continuum_secret_2026@postgres:5432/continuum?sslmode=disable
      - CONTINUUM_REDIS_URL=redis://redis:6379
      - CONTINUUM_PORT=8080
      - CONTINUUM_JWT_SECRET=continuum_jwt_secret_change_in_production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: continuum-dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
