<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="epG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="seG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="prG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="620" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">The Three Memory Types</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#64748b">Each type stores a different shape of knowledge</text>

  <!-- ========== EPISODIC card ========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="105" width="340" height="470" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="60" y="105" width="340" height="90" rx="16" fill="url(#epG)"/>
    <rect x="60" y="170" width="340" height="25" fill="url(#epG)"/>
    <text x="230" y="148" text-anchor="middle" fill="#fff" font-weight="800" font-size="22">📼  Episodic</text>
    <text x="230" y="175" text-anchor="middle" fill="#fff" font-size="13" opacity="0.95">What happened, when</text>

    <text x="85" y="230" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">STORES</text>
    <text x="85" y="255" font-size="14" fill="#334155">•  Session transcripts</text>
    <text x="85" y="278" font-size="14" fill="#334155">•  Tool calls and outcomes</text>
    <text x="85" y="301" font-size="14" fill="#334155">•  User corrections</text>
    <text x="85" y="324" font-size="14" fill="#334155">•  Time-anchored events</text>

    <line x1="85" y1="350" x2="375" y2="350" stroke="#e2e8f0" stroke-width="1"/>

    <text x="85" y="380" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">EXAMPLE</text>
    <rect x="85" y="395" width="290" height="100" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="100" y="420" font-size="12" fill="#166534" font-style="italic">"User asked for dark mode</text>
    <text x="100" y="440" font-size="12" fill="#166534" font-style="italic">at 3pm yesterday, Claude Code</text>
    <text x="100" y="460" font-size="12" fill="#166534" font-style="italic">flipped the theme flag in</text>
    <text x="100" y="480" font-size="12" fill="#166534" font-style="italic">tailwind.config.js"</text>

    <text x="85" y="530" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">BEST AT</text>
    <text x="85" y="555" font-size="13" fill="#475569">Resuming where you left off</text>
  </g>

  <!-- ========== SEMANTIC card ========== -->
  <g filter="url(#cardShadow)">
    <rect x="430" y="105" width="340" height="470" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="430" y="105" width="340" height="90" rx="16" fill="url(#seG)"/>
    <rect x="430" y="170" width="340" height="25" fill="url(#seG)"/>
    <text x="600" y="148" text-anchor="middle" fill="#fff" font-weight="800" font-size="22">🧩  Semantic</text>
    <text x="600" y="175" text-anchor="middle" fill="#fff" font-size="13" opacity="0.95">What is true</text>

    <text x="455" y="230" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">STORES</text>
    <text x="455" y="255" font-size="14" fill="#334155">•  Entities (people, repos, services)</text>
    <text x="455" y="278" font-size="14" fill="#334155">•  Facts about the world</text>
    <text x="455" y="301" font-size="14" fill="#334155">•  User preferences</text>
    <text x="455" y="324" font-size="14" fill="#334155">•  Vector embeddings</text>

    <line x1="455" y1="350" x2="745" y2="350" stroke="#e2e8f0" stroke-width="1"/>

    <text x="455" y="380" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">EXAMPLE</text>
    <rect x="455" y="395" width="290" height="100" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="470" y="420" font-size="12" fill="#1e40af" font-style="italic">"The production database</text>
    <text x="470" y="440" font-size="12" fill="#1e40af" font-style="italic">runs on Harvester node 2,</text>
    <text x="470" y="460" font-size="12" fill="#1e40af" font-style="italic">uses PostgreSQL 16, owned</text>
    <text x="470" y="480" font-size="12" fill="#1e40af" font-style="italic">by the Platform team"</text>

    <text x="455" y="530" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">BEST AT</text>
    <text x="455" y="555" font-size="13" fill="#475569">Answering project questions</text>
  </g>

  <!-- ========== PROCEDURAL card ========== -->
  <g filter="url(#cardShadow)">
    <rect x="800" y="105" width="340" height="470" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="800" y="105" width="340" height="90" rx="16" fill="url(#prG)"/>
    <rect x="800" y="170" width="340" height="25" fill="url(#prG)"/>
    <text x="970" y="148" text-anchor="middle" fill="#fff" font-weight="800" font-size="22">🛠  Procedural</text>
    <text x="970" y="175" text-anchor="middle" fill="#fff" font-size="13" opacity="0.95">How to do something</text>

    <text x="825" y="230" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">STORES</text>
    <text x="825" y="255" font-size="14" fill="#334155">•  Reusable workflows</text>
    <text x="825" y="278" font-size="14" fill="#334155">•  Skill recipes</text>
    <text x="825" y="301" font-size="14" fill="#334155">•  Command sequences</text>
    <text x="825" y="324" font-size="14" fill="#334155">•  Verified runbooks</text>

    <line x1="825" y1="350" x2="1115" y2="350" stroke="#e2e8f0" stroke-width="1"/>

    <text x="825" y="380" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">EXAMPLE</text>
    <rect x="825" y="395" width="290" height="100" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
    <text x="840" y="420" font-size="12" fill="#92400e" font-style="italic">"Deploy Pega Infinity:</text>
    <text x="840" y="440" font-size="12" fill="#92400e" font-style="italic">1) helm lint  2) kubectl apply</text>
    <text x="840" y="460" font-size="12" fill="#92400e" font-style="italic">3) wait for ready  4) smoke</text>
    <text x="840" y="480" font-size="12" fill="#92400e" font-style="italic">test  5) flip ingress"</text>

    <text x="825" y="530" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="1.5">BEST AT</text>
    <text x="825" y="555" font-size="13" fill="#475569">Repeatable tasks</text>
  </g>
</svg>