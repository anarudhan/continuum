<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="doneG" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="activeG" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="plannedG" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="rdS" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="560" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Continuum Roadmap</text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#64748b">Where we are and where we are going</text>

  <!-- Timeline line -->
  <line x1="100" y1="180" x2="1100" y2="180" stroke="#cbd5e1" stroke-width="3"/>

  <!-- Quarter markers -->
  <g font-size="11" font-weight="700" fill="#64748b">
    <line x1="150" y1="170" x2="150" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <text x="150" y="210" text-anchor="middle">Q4 2025</text>
    <line x1="350" y1="170" x2="350" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <text x="350" y="210" text-anchor="middle">Q1 2026</text>
    <line x1="550" y1="170" x2="550" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <text x="550" y="210" text-anchor="middle">Q2 2026</text>
    <line x1="750" y1="170" x2="750" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <text x="750" y="210" text-anchor="middle">Q3 2026</text>
    <line x1="950" y1="170" x2="950" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <text x="950" y="210" text-anchor="middle">Q4 2026</text>
    <line x1="1050" y1="170" x2="1050" y2="190" stroke="#cbd5e1" stroke-width="2"/>
  </g>

  <!-- Today marker -->
  <g>
    <line x1="540" y1="100" x2="540" y2="240" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4"/>
    <rect x="500" y="80" width="80" height="22" rx="11" fill="#ef4444"/>
    <text x="540" y="96" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">TODAY</text>
  </g>

  <!-- ============ MILESTONE BARS ============ -->

  <!-- Done: Memory mesh v1 -->
  <g filter="url(#rdS)">
    <rect x="100" y="260" width="200" height="38" rx="19" fill="url(#doneG)"/>
    <circle cx="119" cy="279" r="9" fill="#fff"/>
    <text x="119" y="284" text-anchor="middle" fill="#059669" font-weight="800" font-size="14">✓</text>
    <text x="155" y="284" fill="#fff" font-size="13" font-weight="700">Memory mesh v1</text>
  </g>
  <text x="305" y="284" font-size="12" fill="#64748b">Shipped Sep 2025</text>

  <!-- Done: WebSocket sync -->
  <g filter="url(#rdS)">
    <rect x="200" y="310" width="180" height="38" rx="19" fill="url(#doneG)"/>
    <circle cx="219" cy="329" r="9" fill="#fff"/>
    <text x="219" y="334" text-anchor="middle" fill="#059669" font-weight="800" font-size="14">✓</text>
    <text x="255" y="334" fill="#fff" font-size="13" font-weight="700">WebSocket sync</text>
  </g>
  <text x="385" y="334" font-size="12" fill="#64748b">Shipped Nov 2025</text>

  <!-- Active: MCP integration -->
  <g filter="url(#rdS)">
    <rect x="400" y="360" width="200" height="38" rx="19" fill="url(#activeG)"/>
    <circle cx="419" cy="379" r="9" fill="#fff"/>
    <text x="419" y="385" text-anchor="middle" fill="#d97706" font-weight="800" font-size="16">●</text>
    <text x="455" y="384" fill="#fff" font-size="13" font-weight="700">MCP integration</text>
  </g>
  <text x="605" y="384" font-size="12" fill="#64748b">In progress, target May 2026</text>

  <!-- Active: Dashboard v2 -->
  <g filter="url(#rdS)">
    <rect x="480" y="410" width="200" height="38" rx="19" fill="url(#activeG)"/>
    <circle cx="499" cy="429" r="9" fill="#fff"/>
    <text x="499" y="435" text-anchor="middle" fill="#d97706" font-weight="800" font-size="16">●</text>
    <text x="535" y="434" fill="#fff" font-size="13" font-weight="700">Dashboard v2</text>
  </g>
  <text x="685" y="434" font-size="12" fill="#64748b">Graph view, target Jun 2026</text>

  <!-- Planned: Vector reranking -->
  <g filter="url(#rdS)">
    <rect x="620" y="460" width="180" height="38" rx="19" fill="url(#plannedG)"/>
    <text x="710" y="484" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Vector reranking</text>
  </g>
  <text x="805" y="484" font-size="12" fill="#64748b">Q3 2026</text>

  <!-- Planned: Hosted cloud -->
  <g filter="url(#rdS)">
    <rect x="880" y="260" width="170" height="38" rx="19" fill="url(#plannedG)"/>
    <text x="965" y="284" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Hosted cloud</text>
  </g>
  <text x="755" y="284" text-anchor="end" font-size="12" fill="#64748b">Sep 2026 launch target</text>

  <!-- Planned: Conflict resolver -->
  <g filter="url(#rdS)">
    <rect x="820" y="310" width="200" height="38" rx="19" fill="url(#plannedG)"/>
    <text x="920" y="334" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Conflict resolver</text>
  </g>
  <text x="755" y="334" text-anchor="end" font-size="12" fill="#64748b">Q4 2026</text>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(60, 510)">
    <rect x="0" y="0" width="22" height="22" rx="11" fill="url(#doneG)"/>
    <text x="33" y="16" font-size="13" fill="#334155" font-weight="600">Shipped</text>

    <rect x="130" y="0" width="22" height="22" rx="11" fill="url(#activeG)"/>
    <text x="163" y="16" font-size="13" fill="#334155" font-weight="600">In progress</text>

    <rect x="285" y="0" width="22" height="22" rx="11" fill="url(#plannedG)"/>
    <text x="318" y="16" font-size="13" fill="#334155" font-weight="600">Planned</text>

    <text x="500" y="16" font-size="12" fill="#64748b" font-style="italic">Dates are aspirational, not commitments</text>
  </g>
</svg>