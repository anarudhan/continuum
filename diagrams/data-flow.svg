<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="stepG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="dropS" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <marker id="flowArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0891b2"/>
    </marker>
    <marker id="bcArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Write Cycle  ·  Agent to Peers</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#64748b">A new fact written by one agent reaches every other agent in real time</text>

  <!-- ============ HORIZONTAL FLOW ============ -->
  <!-- 5 numbered step circles -->
  <!-- Step positions: x = 100, 320, 540, 760, 980 -->

  <!-- connecting line under steps -->
  <line x1="155" y1="220" x2="1045" y2="220" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="6,6"/>

  <!-- Step 1 -->
  <g filter="url(#dropS)">
    <circle cx="155" cy="220" r="55" fill="url(#stepG)"/>
    <text x="155" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" opacity="0.85">STEP</text>
    <text x="155" y="245" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">1</text>
  </g>
  <text x="155" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Hermes writes</text>
  <text x="155" y="342" text-anchor="middle" font-size="12" fill="#475569">POST /memories</text>
  <text x="155" y="362" text-anchor="middle" font-size="12" fill="#475569">with new fact</text>

  <!-- Step 2 -->
  <g filter="url(#dropS)">
    <circle cx="375" cy="220" r="55" fill="url(#stepG)"/>
    <text x="375" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" opacity="0.85">STEP</text>
    <text x="375" y="245" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">2</text>
  </g>
  <text x="375" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">API classifies</text>
  <text x="375" y="342" text-anchor="middle" font-size="12" fill="#475569">Routes to right</text>
  <text x="375" y="362" text-anchor="middle" font-size="12" fill="#475569">memory type</text>

  <!-- Step 3 -->
  <g filter="url(#dropS)">
    <circle cx="595" cy="220" r="55" fill="url(#stepG)"/>
    <text x="595" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" opacity="0.85">STEP</text>
    <text x="595" y="245" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">3</text>
  </g>
  <text x="595" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">DB persists</text>
  <text x="595" y="342" text-anchor="middle" font-size="12" fill="#475569">Vector embedded</text>
  <text x="595" y="362" text-anchor="middle" font-size="12" fill="#475569">and indexed</text>

  <!-- Step 4 -->
  <g filter="url(#dropS)">
    <circle cx="815" cy="220" r="55" fill="url(#stepG)"/>
    <text x="815" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" opacity="0.85">STEP</text>
    <text x="815" y="245" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">4</text>
  </g>
  <text x="815" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Broadcast</text>
  <text x="815" y="342" text-anchor="middle" font-size="12" fill="#475569">WebSocket push</text>
  <text x="815" y="362" text-anchor="middle" font-size="12" fill="#475569">to all peers</text>

  <!-- Step 5 -->
  <g filter="url(#dropS)">
    <circle cx="1045" cy="220" r="55" fill="url(#stepG)"/>
    <text x="1045" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" opacity="0.85">STEP</text>
    <text x="1045" y="245" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">5</text>
  </g>
  <text x="1045" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Peers update</text>
  <text x="1045" y="342" text-anchor="middle" font-size="12" fill="#475569">Claude Code +</text>
  <text x="1045" y="362" text-anchor="middle" font-size="12" fill="#475569">OpenClaw refresh</text>

  <!-- Arrows between steps -->
  <path d="M 210 220 L 320 220" fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#flowArrow)"/>
  <path d="M 430 220 L 540 220" fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#flowArrow)"/>
  <path d="M 650 220 L 760 220" fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#flowArrow)"/>
  <path d="M 870 220 L 990 220" fill="none" stroke="#a855f7" stroke-width="2.5" marker-end="url(#bcArrow)"/>

  <!-- ============ DETAILED FOOTER LANES ============ -->
  <text x="600" y="450" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">What each layer is doing</text>

  <!-- Three explainer cards -->
  <g filter="url(#dropS)">
    <rect x="60" y="480" width="340" height="170" rx="12" fill="#fff" stroke="#bae6fd" stroke-width="1.5"/>
    <rect x="60" y="480" width="340" height="42" rx="12" fill="#e0f2fe"/>
    <rect x="60" y="510" width="340" height="12" fill="#e0f2fe"/>
    <text x="80" y="508" font-size="14" font-weight="800" fill="#075985">⚡  Write Path</text>
    <text x="80" y="548" font-size="13" fill="#334155">Sync REST call. Validates the</text>
    <text x="80" y="568" font-size="13" fill="#334155">payload, picks Episodic /</text>
    <text x="80" y="588" font-size="13" fill="#334155">Semantic / Procedural based</text>
    <text x="80" y="608" font-size="13" fill="#334155">on tags. Returns 201 fast,</text>
    <text x="80" y="628" font-size="13" fill="#334155">embedding happens async.</text>
  </g>

  <g filter="url(#dropS)">
    <rect x="430" y="480" width="340" height="170" rx="12" fill="#fff" stroke="#ddd6fe" stroke-width="1.5"/>
    <rect x="430" y="480" width="340" height="42" rx="12" fill="#ede9fe"/>
    <rect x="430" y="510" width="340" height="12" fill="#ede9fe"/>
    <text x="450" y="508" font-size="14" font-weight="800" fill="#5b21b6">📡  Broadcast Path</text>
    <text x="450" y="548" font-size="13" fill="#334155">Redis Pub/Sub fans the event</text>
    <text x="450" y="568" font-size="13" fill="#334155">out to every connected agent</text>
    <text x="450" y="588" font-size="13" fill="#334155">over WebSocket. Sub-second</text>
    <text x="450" y="608" font-size="13" fill="#334155">propagation. Each peer pulls</text>
    <text x="450" y="628" font-size="13" fill="#334155">only the deltas it cares about.</text>
  </g>

  <g filter="url(#dropS)">
    <rect x="800" y="480" width="340" height="170" rx="12" fill="#fff" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="800" y="480" width="340" height="42" rx="12" fill="#dcfce7"/>
    <rect x="800" y="510" width="340" height="12" fill="#dcfce7"/>
    <text x="820" y="508" font-size="14" font-weight="800" fill="#166534">🔍  Read Path</text>
    <text x="820" y="548" font-size="13" fill="#334155">Vector search against pgvector</text>
    <text x="820" y="568" font-size="13" fill="#334155">returns top-k matches. Token</text>
    <text x="820" y="588" font-size="13" fill="#334155">budget enforced before reply.</text>
    <text x="820" y="608" font-size="13" fill="#334155">Hot results cached in Redis</text>
    <text x="820" y="628" font-size="13" fill="#334155">for under 10ms repeat lookups.</text>
  </g>
</svg>