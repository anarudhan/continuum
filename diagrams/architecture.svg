<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="agentG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="apiG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="memG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="storeG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="redisG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="dashG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#f8fafc"/>

  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Continuum Architecture</text>
  <text x="600" y="64" text-anchor="middle" font-size="13" fill="#64748b">One brain. Every agent. Real-time sync.</text>

  <!-- AGENT SWARM container -->
  <rect x="40" y="90" width="1120" height="130" rx="14" fill="#dbeafe" fill-opacity="0.35" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="64" y="115" font-size="12" font-weight="700" fill="#1e40af" letter-spacing="2.5">AGENT SWARM</text>

  <g filter="url(#shadow)">
    <rect x="80" y="130" width="240" height="70" rx="10" fill="url(#agentG)"/>
    <text x="200" y="160" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">Hermes</text>
    <text x="200" y="182" text-anchor="middle" fill="#fff" font-size="12" opacity="0.9">Frontend</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="340" y="130" width="240" height="70" rx="10" fill="url(#agentG)"/>
    <text x="460" y="160" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">Claude Code</text>
    <text x="460" y="182" text-anchor="middle" fill="#fff" font-size="12" opacity="0.9">Features</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="600" y="130" width="240" height="70" rx="10" fill="url(#agentG)"/>
    <text x="720" y="160" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">Codex</text>
    <text x="720" y="182" text-anchor="middle" fill="#fff" font-size="12" opacity="0.9">Pull Requests</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="860" y="130" width="240" height="70" rx="10" fill="url(#agentG)"/>
    <text x="980" y="160" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">OpenClaw</text>
    <text x="980" y="182" text-anchor="middle" fill="#fff" font-size="12" opacity="0.9">Backend</text>
  </g>

  <!-- arrows agents → api -->
  <path d="M 200 200 L 200 240 L 430 240 L 430 270" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 460 200 L 460 240 L 530 240 L 530 270" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 720 200 L 720 240 L 650 240 L 650 270" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 980 200 L 980 240 L 750 240 L 750 270" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API LAYER -->
  <g filter="url(#shadow)">
    <rect x="290" y="270" width="600" height="110" rx="14" fill="url(#apiG)"/>
    <text x="590" y="305" text-anchor="middle" fill="#fff" font-weight="800" font-size="18">⚙  Continuum API  ·  Go 1.24+</text>
    <rect x="320" y="325" width="170" height="40" rx="8" fill="rgba(255,255,255,0.22)" stroke="#fff" stroke-width="1.2"/>
    <text x="405" y="351" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">REST</text>
    <rect x="505" y="325" width="170" height="40" rx="8" fill="rgba(255,255,255,0.22)" stroke="#fff" stroke-width="1.2"/>
    <text x="590" y="351" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">WebSocket</text>
    <rect x="690" y="325" width="170" height="40" rx="8" fill="rgba(255,255,255,0.22)" stroke="#fff" stroke-width="1.2"/>
    <text x="775" y="351" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">MCP</text>
  </g>

  <!-- Dashboard -->
  <g filter="url(#shadow)">
    <rect x="930" y="290" width="210" height="70" rx="10" fill="url(#dashG)"/>
    <text x="1035" y="318" text-anchor="middle" fill="#fff" font-weight="700" font-size="15">🎨 Dashboard</text>
    <text x="1035" y="338" text-anchor="middle" fill="#fff" font-size="12" opacity="0.92">Knowledge Graph UI</text>
  </g>
  <path d="M 930 325 L 890 325" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowO)"/>

  <!-- arrows api → memory -->
  <path d="M 405 380 L 405 420 L 240 420 L 240 460" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 590 380 L 590 460" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 775 380 L 775 420 L 960 420 L 960 460" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MEMORY MESH container -->
  <rect x="40" y="450" width="1120" height="130" rx="14" fill="#f3e8ff" fill-opacity="0.4" stroke="#a855f7" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="64" y="476" font-size="12" font-weight="700" fill="#6b21a8" letter-spacing="2.5">🧠  MEMORY MESH</text>

  <g filter="url(#shadow)">
    <rect x="80" y="490" width="320" height="75" rx="10" fill="url(#memG)"/>
    <text x="240" y="519" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">📼  Episodic</text>
    <text x="240" y="545" text-anchor="middle" fill="#fff" font-size="12" opacity="0.95">Session history, transcripts</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="440" y="490" width="320" height="75" rx="10" fill="url(#memG)"/>
    <text x="600" y="519" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">🧩  Semantic</text>
    <text x="600" y="545" text-anchor="middle" fill="#fff" font-size="12" opacity="0.95">Entities, facts, preferences</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="490" width="320" height="75" rx="10" fill="url(#memG)"/>
    <text x="960" y="519" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">🛠  Procedural</text>
    <text x="960" y="545" text-anchor="middle" fill="#fff" font-size="12" opacity="0.95">Skills, workflows, runbooks</text>
  </g>

  <!-- arrows memory → storage -->
  <path d="M 240 565 L 240 610 L 460 610 L 460 650" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 600 565 L 600 610 L 520 610 L 520 650" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 960 565 L 960 610 L 760 610 L 760 650" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Postgres cylinder -->
  <g filter="url(#shadow)">
    <ellipse cx="490" cy="650" rx="100" ry="14" fill="url(#storeG)"/>
    <rect x="390" y="650" width="200" height="65" fill="url(#storeG)"/>
    <ellipse cx="490" cy="715" rx="100" ry="14" fill="#1e293b"/>
    <text x="490" y="684" text-anchor="middle" fill="#fff" font-weight="700" font-size="15">PostgreSQL</text>
    <text x="490" y="704" text-anchor="middle" fill="#fff" font-size="12" opacity="0.92">+ pgvector</text>
  </g>

  <!-- Redis cylinder -->
  <g filter="url(#shadow)">
    <ellipse cx="730" cy="650" rx="100" ry="14" fill="url(#redisG)"/>
    <rect x="630" y="650" width="200" height="65" fill="url(#redisG)"/>
    <ellipse cx="730" cy="715" rx="100" ry="14" fill="#b91c1c"/>
    <text x="730" y="684" text-anchor="middle" fill="#fff" font-weight="700" font-size="15">Redis</text>
    <text x="730" y="704" text-anchor="middle" fill="#fff" font-size="12" opacity="0.92">Cache + Pub/Sub</text>
  </g>

  <!-- Storage layer label -->
  <text x="64" y="650" font-size="12" font-weight="700" fill="#334155" letter-spacing="2.5">💾  STORAGE</text>
</svg>