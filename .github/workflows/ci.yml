name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test-go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: continuum
          POSTGRES_PASSWORD: continuum_test
          POSTGRES_DB: continuum
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go mod download
      - run: go build ./...
        env:
          CONTINUUM_DATABASE_URL: postgres://continuum:continuum_test@localhost:5432/continuum?sslmode=disable
          CONTINUUM_REDIS_URL: redis://localhost:6379
      - run: go test ./internal/... -race -coverprofile=coverage.out
        env:
          CONTINUUM_DATABASE_URL: postgres://continuum:continuum_test@localhost:5432/continuum?sslmode=disable
          CONTINUUM_REDIS_URL: redis://localhost:6379
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: ./web
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deployments/docker/Dockerfile -t continuum:test .
      - run: docker run --rm continuum:test /app/continuum --version || true
